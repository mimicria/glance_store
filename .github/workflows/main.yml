name: SBOM

on:
  workflow_dispatch:
  push:
    branches:
      - master
jobs:
  cdxgen:
    runs-on: ubuntu-latest
    container:
      image: ubuntu:24.04 
      
    steps:
      - name: Install packages & cdxgen
        run: |
          apt-get update
          apt-get install -y wget apt-transport-https gnupg lsb-release
          wget -qO -P /bin/ https://github.com/cdxgen/cdxgen/releases/download/v12.1.1/cdxgen-linux-amd64
          mv /bin/cdxgen-linux-amd64 /bin/cdxgen
          chmod +x /bin/cdxgen
        
      - name: Checkout repository
        uses: actions/checkout@v4 

      - name: Cdxgen
        run: |
          cdxgen -o /tmp/cdxgen.json --no-recurse "$GITHUB_WORKSPACE"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cdxgen-sbom
          path: /tmp/cdxgen.json
          retention-days: 30 
      
  trivy:
    runs-on: ubuntu-latest
    container:
      image: ubuntu:24.04 
      
    steps:
      - name: Install packages & cdxgen
        run: |
          apt-get update
          apt-get install -y wget apt-transport-https gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | apt-key add -
          echo "deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | tee -a /etc/apt/sources.list.d/trivy.list
          apt-get update
          apt-get install trivy
        
      - name: Checkout repository
        uses: actions/checkout@v4 

      - name: Trivy
        run: |
          trivy fs --detection-priority comprehensive --format cyclonedx --output /tmp/sbom.json "$GITHUB_WORKSPACE"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: trivy-sbom
          path: /tmp/sbom.json
          retention-days: 30 
      

    

    
